<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🌸 Memory-Spiel 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #FF6B9D;
    --purple: #C77DFF;
    --yellow: #FFD166;
    --mint: #06D6A0;
    --bg: #FFF5F9;
  }

- { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
font-family: ‘Baloo 2’, cursive;
background: var(–bg);
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
padding: 12px 10px 24px;
background-image:
radial-gradient(circle at 10% 20%, rgba(255,107,157,0.12) 0%, transparent 50%),
radial-gradient(circle at 90% 80%, rgba(199,125,255,0.12) 0%, transparent 50%);
}

header {
text-align: center;
margin-bottom: 10px;
}

header h1 {
font-size: 2rem;
font-weight: 800;
background: linear-gradient(135deg, var(–pink), var(–purple));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
line-height: 1.2;
}

header p {
font-size: 0.9rem;
color: #b97dd8;
}

.stats {
display: flex;
gap: 8px;
margin-bottom: 10px;
width: 100%;
max-width: 400px;
justify-content: center;
}

.stat-box {
background: white;
border-radius: 14px;
padding: 6px 14px;
box-shadow: 0 4px 16px rgba(199,125,255,0.15);
text-align: center;
border: 2px solid rgba(199,125,255,0.2);
flex: 1;
max-width: 110px;
}

.stat-box .label {
font-size: 0.6rem;
color: #b97dd8;
text-transform: uppercase;
letter-spacing: 0.08em;
font-weight: 600;
}

.stat-box .value {
font-size: 1.3rem;
font-weight: 800;
color: var(–purple);
line-height: 1.1;
}

.difficulty {
display: flex;
gap: 6px;
margin-bottom: 10px;
width: 100%;
max-width: 400px;
justify-content: center;
}

.diff-btn {
padding: 6px 12px;
border-radius: 20px;
border: 2px solid var(–purple);
background: white;
color: var(–purple);
font-family: ‘Baloo 2’, cursive;
font-size: 0.8rem;
font-weight: 700;
cursor: pointer;
transition: all 0.2s;
flex: 1;
max-width: 110px;
}

.diff-btn.active {
background: var(–purple);
color: white;
}

/* GRID */
.grid {
display: grid;
gap: 8px;
width: 100%;
max-width: 400px;
}

/* CARD — iOS-safe flip using opacity swap instead of 3D transform */
.card {
position: relative;
aspect-ratio: 1;
cursor: pointer;
border-radius: 16px;
user-select: none;
-webkit-user-select: none;
}

.card-inner {
width: 100%;
height: 100%;
position: relative;
border-radius: 16px;
}

.card-back, .card-front {
position: absolute;
inset: 0;
border-radius: 16px;
display: flex;
align-items: center;
justify-content: center;
font-size: clamp(1.5rem, 6vw, 2.2rem);
transition: opacity 0.3s ease, transform 0.3s ease;
box-shadow: 0 6px 20px rgba(199,125,255,0.2);
}

.card-back {
background: linear-gradient(135deg, #C77DFF, #FF6B9D);
opacity: 1;
transform: scale(1);
}

.card-back::after {
content: ‘⭐’;
font-size: 1.5rem;
opacity: 0.7;
}

.card-front {
background: white;
border: 2.5px solid rgba(199,125,255,0.3);
opacity: 0;
transform: scale(0.85);
}

/* Flipped state */
.card.flipped .card-back {
opacity: 0;
transform: scale(0.85);
}

.card.flipped .card-front {
opacity: 1;
transform: scale(1);
}

/* Matched state */
.card.matched .card-front {
background: linear-gradient(135deg, #fff0fa, #f0e6ff);
border-color: var(–pink);
animation: matchPop 0.4s ease;
}

.card.matched .card-back {
opacity: 0;
}

/* Active press */
.card:active .card-inner {
transform: scale(0.93);
transition: transform 0.1s;
}

.btn {
margin-top: 14px;
padding: 13px 32px;
font-family: ‘Baloo 2’, cursive;
font-size: 1rem;
font-weight: 800;
border: none;
border-radius: 50px;
background: linear-gradient(135deg, var(–pink), var(–purple));
color: white;
cursor: pointer;
box-shadow: 0 6px 24px rgba(255,107,157,0.4);
letter-spacing: 0.03em;
width: 100%;
max-width: 400px;
}

.btn:active {
transform: scale(0.96);
box-shadow: 0 2px 12px rgba(255,107,157,0.3);
}

/* Win overlay */
.win-overlay {
display: none;
position: fixed;
inset: 0;
background: rgba(255,245,249,0.95);
z-index: 100;
flex-direction: column;
align-items: center;
justify-content: center;
text-align: center;
padding: 24px;
}

.win-overlay.show {
display: flex;
}

.win-emoji {
font-size: 5rem;
margin-bottom: 10px;
animation: spin 0.7s ease;
}

.win-title {
font-size: 2.8rem;
font-weight: 800;
background: linear-gradient(135deg, var(–pink), var(–purple));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
margin-bottom: 6px;
}

.win-sub {
font-size: 1.05rem;
color: #b97dd8;
margin-bottom: 6px;
}

.stars {
font-size: 2.2rem;
letter-spacing: 4px;
margin: 8px 0 18px;
}

/* Confetti */
.confetti-piece {
position: fixed;
top: -20px;
animation: confettiFall linear forwards;
z-index: 200;
pointer-events: none;
border-radius: 3px;
}

@keyframes matchPop {
0% { transform: scale(1); }
40% { transform: scale(1.18); }
100% { transform: scale(1); }
}

@keyframes spin {
0% { transform: rotate(-15deg) scale(0.5); opacity: 0; }
60% { transform: rotate(8deg) scale(1.2); opacity: 1; }
100% { transform: rotate(0) scale(1); }
}

@keyframes confettiFall {
0% { transform: translateY(0) rotate(0deg); opacity: 1; }
100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}
</style>

</head>
<body>

<header>
  <h1>🌸 Memory 🌸</h1>
  <p>Finde alle Paare!</p>
</header>

<div class="stats">
  <div class="stat-box">
    <div class="label">Versuche</div>
    <div class="value" id="moves">0</div>
  </div>
  <div class="stat-box">
    <div class="label">Paare</div>
    <div class="value" id="pairs">0/8</div>
  </div>
  <div class="stat-box">
    <div class="label">Zeit</div>
    <div class="value" id="timer">0s</div>
  </div>
</div>

<div class="difficulty">
  <button class="diff-btn" onclick="setDifficulty(4,2,this)">Leicht (8)</button>
  <button class="diff-btn" onclick="setDifficulty(4,3,this)">Mittel (12)</button>
  <button class="diff-btn active" onclick="setDifficulty(4,4,this)">Groß (16)</button>
</div>

<div class="grid" id="grid"></div>
<button class="btn" onclick="initGame()">🔄 Neu mischen</button>

<div class="win-overlay" id="winOverlay">
  <div class="win-emoji">🎉</div>
  <div class="win-title">Gewonnen!</div>
  <div class="win-sub" id="winMsg">Super gemacht!</div>
  <div class="stars" id="winStars">⭐⭐⭐</div>
  <button class="btn" onclick="closeWin()">🎮 Nochmal spielen!</button>
</div>

<script>
const EMOJIS = ['🦋','🌈','🦄','🍭','🌸','🐱','🦊','🐸','🍉','🌺','🐬','🦁','🍦','🎀','🐧','🦩'];
let cols = 4, rows = 4;
let flipped = [], matched = 0, moves = 0, lockBoard = false;
let timerInterval, seconds = 0, gameStarted = false;
let totalPairs = 0;

function setDifficulty(c, r, btn) {
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  cols = c; rows = r;
  initGame();
}

function initGame() {
  clearInterval(timerInterval);
  seconds = 0; moves = 0; matched = 0; gameStarted = false; lockBoard = false;
  totalPairs = (cols * rows) / 2;
  document.getElementById('timer').textContent = '0s';
  document.getElementById('moves').textContent = '0';
  document.getElementById('pairs').textContent = `0/${totalPairs}`;

  const pairs = EMOJIS.slice(0, totalPairs);
  const cards = shuffle([...pairs, ...pairs]);

  const grid = document.getElementById('grid');
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  grid.innerHTML = '';

  cards.forEach((emoji, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.emoji = emoji;
    card.innerHTML = `<div class="card-inner"><div class="card-back"></div><div class="card-front">${emoji}</div></div>`;
    card.addEventListener('click', () => flipCard(card));
    grid.appendChild(card);
  });

  flipped = [];
}

function flipCard(card) {
  if (lockBoard) return;
  if (card.classList.contains('flipped') || card.classList.contains('matched')) return;

  if (!gameStarted) {
    gameStarted = true;
    timerInterval = setInterval(() => {
      seconds++;
      document.getElementById('timer').textContent = seconds + 's';
    }, 1000);
  }

  card.classList.add('flipped');
  flipped.push(card);

  if (flipped.length === 2) {
    moves++;
    document.getElementById('moves').textContent = moves;
    lockBoard = true;

    const [a, b] = flipped;
    if (a.dataset.emoji === b.dataset.emoji) {
      a.classList.add('matched');
      b.classList.add('matched');
      matched++;
      document.getElementById('pairs').textContent = `${matched}/${totalPairs}`;
      flipped = [];
      lockBoard = false;
      if (matched === totalPairs) setTimeout(showWin, 600);
    } else {
      setTimeout(() => {
        a.classList.remove('flipped');
        b.classList.remove('flipped');
        flipped = [];
        lockBoard = false;
      }, 950);
    }
  }
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function showWin() {
  clearInterval(timerInterval);
  const ratio = moves / totalPairs;
  const stars = ratio <= 1.4 ? '⭐⭐⭐' : ratio <= 2.2 ? '⭐⭐' : '⭐';
  const msg = ratio <= 1.4 ? 'Wow, du bist ein Memory-Profi! 🏆' : ratio <= 2.2 ? 'Sehr gut gemacht! 👏' : 'Toll, alle Paare gefunden! 🎊';
  document.getElementById('winStars').textContent = stars;
  document.getElementById('winMsg').innerHTML = `${msg}<br><small style="color:#b97dd8;font-size:0.85rem">${moves} Versuche · ${seconds}s</small>`;
  document.getElementById('winOverlay').classList.add('show');
  launchConfetti();
}

function closeWin() {
  document.getElementById('winOverlay').classList.remove('show');
  initGame();
}

function launchConfetti() {
  const colors = ['#FF6B9D','#C77DFF','#FFD166','#06D6A0','#74C0FC','#FF8C69'];
  for (let i = 0; i < 70; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const size = 8 + Math.random() * 10;
    el.style.cssText = `
      left: ${Math.random() * 100}vw;
      width: ${size}px;
      height: ${size}px;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      animation-duration: ${1.4 + Math.random() * 2}s;
      animation-delay: ${Math.random() * 0.6}s;
      border-radius: ${Math.random() > 0.5 ? '50%' : '3px'};
    `;
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

initGame();
</script>

</body>
</html>
